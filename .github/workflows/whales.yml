name: whale tracker

# Polls tracked wallets in the cloud so alerts arrive with your PC off.
#
# GitHub's minimum cron is every 5 minutes, and scheduled runs can lag another
# 5-15 min under load. So this is NOT the 45-second local tracker - it is the
# always-on backstop. For a whale you are FOLLOWING (not racing), catching a
# $10k bet within a few minutes is fine; if you need true real-time with the PC
# off, that needs a small paid worker.
#
# Uses the same DATABASE_URL / TELEGRAM secrets already set for the scan
# workflow. The first run primes silently; alerts begin on the next new trade.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: whale-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install
        run: pip install --quiet -r requirements.txt
      - name: Poll whales
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHALE_BOT_TOKEN: ${{ secrets.WHALE_BOT_TOKEN }}
          WHALE_CHAT_ID: ${{ secrets.WHALE_CHAT_ID }}
        run: python -m edge_engine.scan whalepoll
